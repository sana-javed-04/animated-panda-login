<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda watching Login form</title>
    <link rel="stylesheet" href="form.css">

    <!-- google icon -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
    <div class="cont">

        <div class="vido-cont">
            <video id="pnda-vido" muted>
                <source src="panda.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <form action="/form">

            <label for="mail">Email</label>
            <input type="email" name="mail" id="mail" placeholder="Panda@gmail.com" value="">

            <label for="pswrd">Password</label>
            <input type="password" name="pswrd" id="pswrd" placeholder="Pnda-123" value="">

            <div class="icons">
                <span class="material-symbols-outlined" id="off">visibility_off</span>
                <span class="material-symbols-outlined" id="show">visibility</span>
            </div>

            <button type="submit">LogIn</button>

        </form>

    </div>

    <script src="form.js"></script>
</body>

</html>
